<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qards 🦦 Lern-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen pb-12">

<nav class="pt-6 pb-4 mb-6">
    <div class="max-w-4xl mx-auto px-6 flex justify-center items-center">
        <div class="flex items-center gap-3 bg-white px-6 py-3 rounded-full shadow-sm border border-violet-100">
            <div class="text-2xl">🦦</div>
            <h1 class="text-2xl font-extrabold tracking-tight text-violet-600">Qards</h1>
        </div>
    </div>
</nav>

<div id="error-message" class="hidden fixed top-6 right-6 bg-rose-500 text-white px-6 py-4 rounded-2xl shadow-xl z-50 flex items-center gap-3 font-bold">
    <span>⚠️</span>
    <p id="error-text" class="text-sm"></p>
</div>

<div id="modal-mode" class="hidden fixed inset-0 bg-violet-900/20 backdrop-blur-sm z-50 flex items-center justify-center p-4 view-transition">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden border-2 border-violet-100">
        <div class="p-6 text-center relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-300 hover:text-slate-500 btn-haptic bg-slate-100 rounded-full p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div class="text-4xl mb-2">📚</div>
            <h3 class="font-extrabold text-xl text-slate-800" id="modal-deck-title">Deck Name</h3>
            <p class="text-slate-500 text-sm mt-1">Wie möchtest du heute lernen?</p>
        </div>
        <div class="p-6 pt-0 space-y-4">
            <button onclick="startTraining('random')" class="btn-haptic w-full bg-violet-50 text-violet-700 hover:bg-violet-100 p-4 rounded-2xl font-bold transition-colors flex items-center justify-center gap-3 border-b-4 border-violet-200">
                <span>🎲</span> Zufälliger Mix
            </button>
            <button onclick="startTraining('strict')" class="btn-haptic w-full bg-teal-50 text-teal-700 hover:bg-teal-100 p-4 rounded-2xl font-bold transition-colors flex items-center justify-center gap-3 border-b-4 border-teal-200">
                <span>🎯</span> Ganzes Deck strikt
            </button>
        </div>
    </div>
</div>

<main class="max-w-3xl mx-auto px-4">

    <div id="view-start" class="view-transition">

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white border-2 border-violet-100 p-6 rounded-3xl flex flex-col items-center justify-center shadow-sm relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-6xl opacity-10">🧠</div>
                <span id="stat-learned" class="text-4xl font-extrabold text-violet-600">0</span>
                <span class="text-sm font-bold text-slate-400 mt-2">Karten gelernt</span>
            </div>
            <div class="bg-white border-2 border-teal-100 p-6 rounded-3xl flex flex-col items-center justify-center shadow-sm relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-6xl opacity-10">🏆</div>
                <span id="stat-rate" class="text-4xl font-extrabold text-teal-500">0%</span>
                <span class="text-sm font-bold text-slate-400 mt-2">Erfolgsquote</span>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-extrabold text-slate-800">Deine Decks 🗂️</h2>
            <button onclick="showView('view-create')" class="btn-haptic bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold py-3 px-6 rounded-2xl transition-colors shadow-sm flex items-center gap-2 border-b-4 border-violet-800">
                <span>+</span> Neues Set
            </button>
        </div>

        <div id="decks-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        </div>
    </div>

    <div id="view-quiz" class="hidden view-transition flex flex-col items-center">

        <div class="w-full max-w-lg flex items-center justify-between mb-8 bg-white p-3 rounded-full shadow-sm border border-slate-100">
            <button onclick="showView('view-start')" class="btn-haptic w-10 h-10 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </button>
            <div class="text-center px-4">
                <span id="quiz-deck-title" class="text-xs font-extrabold text-violet-500 uppercase tracking-wider block">DECK NAME</span>
                <span id="quiz-progress" class="text-sm text-slate-400 font-bold"></span>
            </div>
            <div class="w-10"></div> </div>

        <div class="perspective-1000 w-full max-w-lg mx-auto h-[380px] mb-10">
            <div id="flashcard" class="card-inner" onclick="flipCard()">
                <div class="card-front hover:-translate-y-1 transition-transform">
                    <div class="text-4xl mb-4">🤔</div>
                    <h3 id="card-question" class="text-2xl font-extrabold text-slate-700 text-center px-4 leading-snug">...</h3>
                    <div class="absolute bottom-6 text-slate-300 text-sm font-bold flex items-center gap-2">
                        <span>👆</span> Tippen zum Umdrehen
                    </div>
                </div>
                <div class="card-back">
                    <div class="text-4xl mb-4">💡</div>
                    <h3 id="card-answer" class="text-xl font-bold text-violet-700 text-center px-4 leading-relaxed">...</h3>
                </div>
            </div>
        </div>

        <div id="assessment-buttons" class="w-full max-w-lg grid grid-cols-2 gap-4 opacity-0 pointer-events-none transition-all duration-300 translate-y-4">

            <button onclick="submitAssessment(false)" class="btn-haptic bg-rose-400 hover:bg-rose-500 text-white py-5 rounded-3xl font-extrabold text-lg flex flex-col items-center justify-center gap-1 transition-colors border-b-4 border-rose-600 shadow-sm">
                <span class="text-2xl">😅</span>
                Wusste ich nicht
            </button>

            <button onclick="submitAssessment(true)" class="btn-haptic bg-teal-400 hover:bg-teal-500 text-white py-5 rounded-3xl font-extrabold text-lg flex flex-col items-center justify-center gap-1 transition-colors border-b-4 border-teal-600 shadow-sm">
                <span class="text-2xl">😎</span>
                Wusste ich!
            </button>

        </div>
    </div>

    <div id="view-create" class="hidden view-transition max-w-2xl mx-auto">
        <div class="bg-white border-2 border-slate-100 rounded-3xl overflow-hidden shadow-sm">

            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h2 class="text-xl font-extrabold text-slate-800 flex items-center gap-2"><span>✨</span> Neues Set kreieren</h2>
                <button onclick="showView('view-start')" class="btn-haptic text-slate-400 hover:text-slate-600 text-sm font-bold bg-white px-4 py-2 rounded-full shadow-sm">Abbrechen</button>
            </div>

            <div class="p-8">
                <div class="mb-8">
                    <label class="block text-sm font-extrabold text-slate-500 mb-2">Wie soll das Set heißen?</label>
                    <input type="text" id="input-deck-name" placeholder="z.B. Spanisch Vokabeln 🇪🇸" class="w-full bg-slate-50 px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-violet-400 outline-none transition-all font-bold text-lg text-slate-700 placeholder-slate-300">
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-sm font-extrabold text-slate-500">Karten hinzufügen</h3>
                    </div>

                    <div id="qa-container" class="space-y-4"></div>

                    <button onclick="addQaField()" class="btn-haptic w-full py-4 border-2 border-dashed border-slate-200 text-slate-400 font-bold rounded-2xl hover:border-violet-300 hover:text-violet-500 transition-colors flex justify-center items-center gap-2 mt-4">
                        <span>+</span> Neue Karte anlegen
                    </button>
                </div>

                <div class="mt-10">
                    <button onclick="saveDeck()" class="btn-haptic w-full bg-violet-600 hover:bg-violet-700 text-white font-extrabold text-lg py-5 rounded-2xl shadow-sm transition-colors border-b-4 border-violet-800 flex justify-center items-center gap-2">
                        <span>🚀</span> Set speichern & loslegen
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="app.js"></script>

<script>
    // Wir überschreiben kurz die Art, wie das Deck-Element gerendert wird, da app.js die Klassen hardcoded generiert.
    // Die LOGIK bleibt aber identisch.
    const originalLoadDashboard = loadDashboard;
    loadDashboard = async function() {
        await originalLoadDashboard();
        const container = document.getElementById('decks-container');
        const buttons = container.querySelectorAll('button');
        buttons.forEach(btn => {
            // Ersetze die alten "Enterprise" Klassen mit dem neuen Duolingo-Style
            btn.className = 'btn-haptic w-full text-left bg-white border-2 border-slate-100 p-6 rounded-3xl shadow-sm hover:border-violet-300 group flex justify-between items-center transition-all border-b-4';
            const svgContainer = btn.querySelector('.w-10');
            if(svgContainer) {
                svgContainer.className = 'w-12 h-12 rounded-2xl bg-violet-50 flex items-center justify-center text-violet-500 group-hover:bg-violet-500 group-hover:text-white transition-all transform group-hover:rotate-12 group-hover:scale-110';
            }
        });
    };

    const originalAddQaField = addQaField;
    addQaField = function() {
        originalAddQaField();
        const container = document.getElementById('qa-container');
        const lastRow = container.lastElementChild;
        if(lastRow) {
            lastRow.className = 'qa-pair flex gap-3 items-center group bg-slate-50 p-3 rounded-2xl border-2 border-transparent focus-within:border-violet-100 transition-colors';
            const inputs = lastRow.querySelectorAll('input');
            inputs.forEach(input => {
                input.className = Array.from(input.classList).filter(c => c.startsWith('input-')).join(' ') + ' flex-1 bg-white px-4 py-3 rounded-xl border-2 border-slate-100 text-sm font-bold focus:border-violet-400 outline-none transition-colors text-slate-600 placeholder-slate-300';
            });
            const btn = lastRow.querySelector('button');
            btn.className = 'btn-haptic p-3 bg-white border-2 border-slate-100 rounded-xl text-slate-300 hover:text-rose-500 hover:border-rose-200 transition-colors';
        }
    };
</script>
</body>
</html>
